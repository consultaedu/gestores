<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ConsultaEdu | Em manutenção</title>
<link rel="icon" type="image/png" href="favicon.png">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Inter, Arial, sans-serif;
}

body {
  min-height: 100vh;
  background:
    radial-gradient(circle at top left, rgba(22, 163, 74, .22), transparent 35%),
    radial-gradient(circle at bottom right, rgba(37, 99, 235, .18), transparent 35%),
    linear-gradient(135deg, #f6fbf8, #eef6ff);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
  color: #123;
}

.card {
  width: 100%;
  max-width: 640px;
  background: rgba(255,255,255,.86);
  backdrop-filter: blur(16px);
  border: 1px solid rgba(255,255,255,.7);
  border-radius: 28px;
  padding: 44px 34px;
  text-align: center;
  box-shadow: 0 24px 70px rgba(15, 23, 42, .13);
  animation: subir .7s ease both;
}

.badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: #ecfdf3;
  color: #137333;
  border: 1px solid #bbf7d0;
  padding: 8px 14px;
  border-radius: 999px;
  font-weight: 700;
  font-size: 14px;
  margin-bottom: 24px;
}

.icon {
  width: 86px;
  height: 86px;
  margin: 0 auto 24px;
  border-radius: 24px;
  background: linear-gradient(135deg, #16a34a, #0f766e);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 42px;
  box-shadow: 0 14px 34px rgba(22, 163, 74, .32);
}

h1 {
  font-size: clamp(30px, 5vw, 44px);
  color: #0f172a;
  margin-bottom: 14px;
  letter-spacing: -1px;
}

p {
  font-size: 17px;
  color: #475569;
  line-height: 1.7;
  max-width: 520px;
  margin: 0 auto;
}

.status {
  margin: 30px auto 24px;
  max-width: 430px;
  background: #f8fafc;
  border: 1px solid #e2e8f0;
  border-radius: 18px;
  padding: 18px;
}

.status-title {
  font-size: 14px;
  font-weight: 800;
  color: #334155;
  margin-bottom: 12px;
}

.progress {
  width: 100%;
  height: 9px;
  background: #e2e8f0;
  border-radius: 99px;
  overflow: hidden;
}

.progress span {
  display: block;
  width: 45%;
  height: 100%;
  background: linear-gradient(90deg, #16a34a, #22c55e, #0ea5e9);
  border-radius: 99px;
  animation: carregando 1.8s infinite ease-in-out;
}

button {
  border: none;
  background: #0f5132;
  color: white;
  padding: 14px 22px;
  border-radius: 14px;
  font-size: 15px;
  font-weight: 800;
  cursor: pointer;
  transition: .2s;
}

button:hover {
  transform: translateY(-2px);
  box-shadow: 0 12px 24px rgba(15, 81, 50, .25);
}

.footer {
  margin-top: 28px;
  font-size: 13px;
  color: #94a3b8;
}

@keyframes carregando {
  0% { transform: translateX(-110%); }
  50% { transform: translateX(80%); }
  100% { transform: translateX(240%); }
}

@keyframes subir {
  from {
    opacity: 0;
    transform: translateY(18px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

@media (max-width: 520px) {
  .card {
    padding: 34px 22px;
    border-radius: 22px;
  }

  p {
    font-size: 15px;
  }
}
</style>
</head>

<body>

<main class="card">
  <div class="badge">🟢 ConsultaEdu</div>

  <div class="icon">🛠️</div>

  <h1>Sistema em manutenção</h1>

  <p>
    Estamos realizando melhorias para deixar este serviço mais estável, rápido e seguro.
    Voltaremos em breve.
  </p>

  <div class="status">
    <div class="status-title">Atualização em andamento</div>
    <div class="progress">
      <span></span>
    </div>
  </div>

  <button onclick="location.reload()">Tentar novamente</button>

  <div class="footer">
    ConsultaEdu © 2026
  </div>
</main>

</body>
</html>
